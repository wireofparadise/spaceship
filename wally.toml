version = "1.0.0"
license = "MIT"
authors = ["wireofparadise <wireofparadise@gmail.com>"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
homepage = "https://wireofparadise.github.io/spaceship/"
repository = "https://github.com/wireofparadise/spaceship"
exclude = [
