[package]
name = "wireofparadise/spaceship"
description = "A type-safe data store system for Roblox that simplifies loading, saving, and migrating data through structured, versioned collections."
version = "1.1.0"
license = "MIT"
authors = ["wireofparadise <wireofparadise@gmail.com>"]
registry = "https://github.com/UpliftGames/wally-index"
realm = "shared"
homepage = "https://wireofparadise.github.io/spaceship/"
repository = "https://github.com/wireofparadise/spaceship"
exclude = [
    # macOS finder meta
    ".DS_Store",

    # Git
    ".git",
    ".gitignore",
    ".github",

    # Visual Studio Code settings
    ".vscode",

    # Documentation
    "docs",
    "CONTRIBUTING.md",
    "mkdocs.yml",
    "requirements.txt",

    # Language server configuration
    ".luaurc",

    # npm
    "node_modules",
    "package-lock.json",
    "package.json",

    # Toolchain
    "rokit.toml",
    "selene.toml",
    "sourcemap.json",

    # Rojo builds
    "*.rbxl",
    "*.rbxlx",
    "*.rbxl.lock",
    "*.rbxlx.lock",
    "*.rbxm",
    "*.rbxmx",

    # Packages
    "*.tgz",

    # TypeScript files
    "*.ts",
]
