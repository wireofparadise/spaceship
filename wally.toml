    "package.json",
    "*.rbxl",
    "*.rbxlx",
    "*.rbxl.lock",
    "*.rbxlx.lock",
    "*.rbxm",
    "*.rbxmx",
    "*.d.ts",
    "rokit.toml",
    "selene.toml",
    "sourcemap.json",
